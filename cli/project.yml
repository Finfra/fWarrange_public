name: fWarrangeCli
options:
  bundleIdPrefix: kr.finfra
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: kr.finfra.fWarrangeCli
    INFOPLIST_KEY_LSUIElement: true
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: true
    # 서명 설정 SSOT — Issue37(20c054d) 수동 추가가 XcodeGen 재생성 시 삭제되는 문제(Issue39 세션 재발) 재발 방지
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: BZDZFZWF6K
    PROVISIONING_PROFILE_SPECIFIER: ""

targets:
  fWarrangeCli:
    type: application
    platform: macOS
    sources:
      - fWarrangeCli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.finfra.fWarrangeCli
        INFOPLIST_KEY_LSUIElement: true
        CODE_SIGN_ENTITLEMENTS: fWarrangeCli/fWarrangeCli.entitlements
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: fWarrangeCli/fWarrangeCli.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    scheme:
      testTargets:
        - fWarrangeCliTests
      gatherCoverageData: true

  fWarrangeCliTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - fWarrangeCliTests
    dependencies:
      - target: fWarrangeCli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.finfra.fWarrangeCliTests
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/fWarrangeCli.app/Contents/MacOS/fWarrangeCli"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
